name: Publish to PyPI
on:
  push:
    tags: ["v*"]
permissions:
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.0.0
      - run: uv python install 3.13
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
